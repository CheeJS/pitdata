<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/websiteicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>PITDATA | F1 Race Analytics &amp; Predictions</title>
  <meta name="description" content="Formula 1 race analytics, AI race predictions, live standings, lap-by-lap replay, telemetry analysis and historical data — all in one place." />

  <meta name="author" content="pitdata.site" />
  <link rel="canonical" href="https://pitdata.site/" />

  <!-- Open Graph (Google, Facebook, Discord) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://pitdata.site/" />
  <meta property="og:title" content="PITDATA | F1 Race Analytics &amp; Predictions" />
  <meta property="og:description" content="Formula 1 race analytics, AI race predictions, live standings, lap-by-lap replay, telemetry analysis and historical data — all in one place." />
  <meta property="og:image" content="https://pitdata.site/websiteicon.png" />
  <meta property="og:site_name" content="PITDATA" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="PITDATA | F1 Race Analytics &amp; Predictions" />
  <meta name="twitter:description" content="Formula 1 race analytics, AI race predictions, live standings, lap-by-lap replay, telemetry analysis and historical data — all in one place." />
  <meta name="twitter:image" content="https://pitdata.site/websiteicon.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "PITDATA",
    "url": "https://pitdata.site",
    "description": "Formula 1 race analytics, AI race predictions, live standings, lap-by-lap replay, telemetry analysis and historical data.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://pitdata.site/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>

  <div id="root"></div>
